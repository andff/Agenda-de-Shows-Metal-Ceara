<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortaleza Night — Shows & Bares</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --surface2:  #1a1a24;
      --border:    #2a2a3a;
      --accent:    #e8ff47;
      --accent2:   #ff4f6e;
      --accent3:   #47d4ff;
      --text:      #e8e8f0;
      --muted:     #6a6a80;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); }

    /* ── LAYOUT ── */
    #app { display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 340px;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 10;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 22px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .logo {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 3px;
    }
    .logo span { color: var(--accent); }

    .tagline {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ── SEARCH ── */
    #search-wrap {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 14px 9px 36px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }
    #search-wrap { position: relative; }

    /* ── CATEGORIES ── */
    #cats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .cat-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cat-btn:hover { border-color: var(--text); color: var(--text); }
    .cat-btn.active { color: var(--bg); border-color: transparent; font-weight: 700; }
    .cat-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── RESULTS ── */
    #results-header {
      padding: 10px 16px 6px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid var(--border);
    }

    #list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .card:hover { background: var(--surface2); }
    .card.active { background: var(--surface2); }
    .card.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .card-name { font-family: var(--font-head); font-size: 14px; font-weight: 700; line-height: 1.2; }
    .card-badge {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-addr { font-size: 11px; color: var(--muted); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-date { font-size: 11px; color: var(--accent); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    /* ── MAP ── */
    #map { flex: 1; }

    /* ── POPUP CUSTOM ── */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      padding: 0 !important;
      color: var(--text) !important;
      font-family: var(--font-mono) !important;
      min-width: 260px;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; top: 10px !important; right: 12px !important; }
    .leaflet-popup-close-button:hover { color: var(--text) !important; }

    .popup-inner { padding: 18px 20px 16px; }
    .popup-cat {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 8px;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .popup-name { font-family: var(--font-head); font-size: 18px; font-weight: 800; line-height: 1.1; margin-bottom: 12px; }
    .popup-row { display: flex; gap: 8px; font-size: 11px; margin-bottom: 7px; color: var(--muted); align-items: flex-start; }
    .popup-row-icon { flex-shrink: 0; margin-top: 1px; }
    .popup-row-val { color: var(--text); }
    .popup-row-val a { color: var(--accent3); text-decoration: none; }
    .popup-row-val a:hover { text-decoration: underline; }
    .popup-date-val { color: var(--accent) !important; font-weight: 700; }
    .popup-maps-btn {
      display: block;
      margin-top: 14px;
      padding: 8px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .popup-maps-btn:hover { opacity: 0.85; }

    /* ── MARKER ── */
    .custom-marker {
      width: 32px; height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
    }
    .custom-marker span { transform: rotate(45deg); font-size: 13px; display: block; }

    /* ── MOBILE TOGGLE ── */
    #mobile-toggle {
      display: none;
      position: fixed;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 30px;
      padding: 10px 22px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(232,255,71,0.3);
    }

    @media (max-width: 720px) {
      #app { flex-direction: column; }
      #sidebar {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        width: 100%; min-width: 0;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        z-index: 100;
      }
      #sidebar.open { transform: translateY(0); }
      #map { height: 100vh; width: 100vw; }
      #mobile-toggle { display: block; }
    }

    /* scrollbar */
    #list::-webkit-scrollbar { width: 4px; }
    #list::-webkit-scrollbar-track { background: transparent; }
    #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">Fortaleza<span>Night</span></div>
      <div class="tagline">Shows &amp; Bares da cidade</div>
    </div>

    <div id="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Buscar local, bairro..." autocomplete="off" />
    </div>

    <div id="cats"></div>

    <div id="results-header"></div>
    <div id="list"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<button id="mobile-toggle">🗺 Ver Lista</button>

<script src="data.js"></script>
<script>
// ── CONFIG DE CATEGORIAS ──────────────────────────────────────────────────────
const CAT_CONFIG = {
  'Show'       : { color: '#e8ff47', emoji: '🎵' },
  'Bar'        : { color: '#ff4f6e', emoji: '🍺' },
  'Balada'     : { color: '#47d4ff', emoji: '🪩' },
  'Gastrobar'  : { color: '#ff9f47', emoji: '🍽️' },
  'Roof/Lounge': { color: '#c147ff', emoji: '✨' },
  'Festival'   : { color: '#47ffb4', emoji: '🎪' },
};

function catColor(cat) { return (CAT_CONFIG[cat] || { color: '#888' }).color; }
function catEmoji(cat) { return (CAT_CONFIG[cat] || { emoji: '📍' }).emoji; }

// ── MAPA ─────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([-3.7319, -38.5267], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ── ESTADO ──────────────────────────────────────────────────────────────────
let activeCategory = 'Todos';
let searchTerm     = '';
let markers        = {};
let activeCard     = null;

// ── FILTRO ───────────────────────────────────────────────────────────────────
function filtered() {
  return PLACES.filter(p => {
    const matchCat  = activeCategory === 'Todos' || p.categoria === activeCategory;
    const q         = searchTerm.toLowerCase();
    const matchSearch = !q || p.nome.toLowerCase().includes(q)
                              || p.bairro.toLowerCase().includes(q)
                              || p.endereco.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

// ── MARKERS ──────────────────────────────────────────────────────────────────
function buildIcon(cat, big = false) {
  const color = catColor(cat);
  const emoji = catEmoji(cat);
  const size  = big ? 40 : 32;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);background:${color};
      border:2px solid #0a0a0f;display:flex;align-items:center;
      justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,0.6);
      transition:all .2s">
      <span style="transform:rotate(45deg);font-size:${big?16:13}px">${emoji}</span>
    </div>`,
    iconSize:   [size, size],
    iconAnchor: [size/2, size],
    popupAnchor:[0, -size]
  });
}

function popupHTML(p) {
  const color = catColor(p.categoria);
  const igLink = p.instagram
    ? `<a href="https://instagram.com/${p.instagram.replace('@','')}" target="_blank">${p.instagram}</a>`
    : '—';
  const mapsLink = `https://www.google.com/maps?q=${p.lat},${p.lng}`;
  return `
    <div class="popup-inner">
      <div class="popup-cat" style="background:${color}22;color:${color}">${catEmoji(p.categoria)} ${p.categoria}</div>
      <div class="popup-name">${p.nome}</div>
      <div class="popup-row"><span class="popup-row-icon">📍</span><span class="popup-row-val">${p.endereco}</span></div>
      <div class="popup-row"><span class="popup-row-icon">🏘</span><span class="popup-row-val">${p.bairro}</span></div>
      <div class="popup-row"><span class="popup-row-icon">📸</span><span class="popup-row-val">${igLink}</span></div>
      <div class="popup-row"><span class="popup-row-icon">🗓</span><span class="popup-row-val popup-date-val">${p.dia_evento}</span></div>
      <a class="popup-maps-btn" href="${mapsLink}" target="_blank">↗ Abrir no Google Maps</a>
    </div>`;
}

function renderMarkers() {
  // limpa
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  filtered().forEach(p => {
    const m = L.marker([p.lat, p.lng], { icon: buildIcon(p.categoria) })
      .addTo(map)
      .bindPopup(popupHTML(p), { maxWidth: 300 });

    m.on('click', () => selectPlace(p.id, false));
    markers[p.id] = m;
  });
}

// ── LISTA ────────────────────────────────────────────────────────────────────
function renderList() {
  const list    = document.getElementById('list');
  const header  = document.getElementById('results-header');
  const places  = filtered();

  header.textContent = `${places.length} local${places.length !== 1 ? 'is' : ''} encontrado${places.length !== 1 ? 's' : ''}`;

  if (!places.length) {
    list.innerHTML = `<div class="empty-state">Nenhum local encontrado.<br>Tente outro filtro ou busca.</div>`;
    return;
  }

  list.innerHTML = places.map(p => {
    const color = catColor(p.categoria);
    return `
      <div class="card" data-id="${p.id}" id="card-${p.id}">
        <div class="card-top">
          <div class="card-name">${p.nome}</div>
          <div class="card-badge" style="background:${color}22;color:${color}">${p.categoria}</div>
        </div>
        <div class="card-addr">${p.bairro} — ${p.endereco}</div>
        <div class="card-date">🗓 ${p.dia_evento}</div>
      </div>`;
  }).join('');

  list.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => selectPlace(+el.dataset.id, true));
  });
}

// ── SELEÇÃO ──────────────────────────────────────────────────────────────────
function selectPlace(id, panMap) {
  // deselect old
  if (activeCard) {
    const old = document.getElementById(`card-${activeCard}`);
    if (old) old.classList.remove('active');
    if (markers[activeCard]) markers[activeCard].setIcon(buildIcon(
      PLACES.find(p => p.id === activeCard)?.categoria
    ));
  }

  activeCard = id;
  const place = PLACES.find(p => p.id === id);
  if (!place) return;

  // highlight card
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // marker
  if (markers[id]) {
    markers[id].setIcon(buildIcon(place.categoria, true));
    if (panMap) {
      map.setView([place.lat, place.lng], 16, { animate: true });
    }
    markers[id].openPopup();
  }

  // close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

// ── CATEGORIAS ───────────────────────────────────────────────────────────────
function renderCats() {
  const cats = ['Todos', ...Object.keys(CAT_CONFIG)];
  const container = document.getElementById('cats');
  container.innerHTML = cats.map(c => {
    const color = c === 'Todos' ? '#e8e8f0' : catColor(c);
    return `<button class="cat-btn${c === activeCategory ? ' active' : ''}" data-cat="${c}"
        style="${c === activeCategory ? `background:${color};color:#0a0a0f;border-color:${color}` : ''}">
      ${c !== 'Todos' ? `<span class="dot" style="background:${color}"></span>` : ''}
      ${c}
    </button>`;
  }).join('');

  container.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderCats(); render();
    });
  });
}

function render() { renderMarkers(); renderList(); }

// ── BUSCA ────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

// ── MOBILE ──────────────────────────────────────────────────────────────────
const toggle  = document.getElementById('mobile-toggle');
const sidebar = document.getElementById('sidebar');
toggle.addEventListener('click', () => {
  const open = sidebar.classList.toggle('open');
  toggle.textContent = open ? '🗺 Ver Mapa' : '🗺 Ver Lista';
});

// ── INIT ─────────────────────────────────────────────────────────────────────
renderCats();
render();
</script>
</body>
</html>
