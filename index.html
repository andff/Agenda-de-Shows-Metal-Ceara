<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Agenda de Shows Metal Ceará</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="O guia definitivo de bares, shows e eventos da cena underground e heavy metal no estado do Ceará com mapa interativo.">
    <meta name="keywords" content="metal, ceará, agenda, shows, rock, underground, fortaleza, mapa, bares, eventos">
    <meta name="author" content="Metal Ceará Project">
    <link rel="canonical" href="http://andff.runasp.net/Agenda-de-Shows-Metal-Ceara/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://andff.runasp.net/Agenda-de-Shows-Metal-Ceara/">
    <meta property="og:title" content="Agenda de Shows Metal Ceará 🤘">
    <meta property="og:description"
        content="Encontre bares, shows e eventos de Metal no Ceará em um mapa interativo e em tempo real.">
    <meta property="og:image" content="http://andff.runasp.net/Agenda-de-Shows-Metal-Ceara/img/logo_metal_ceara.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="http://andff.runasp.net/Agenda-de-Shows-Metal-Ceara/">
    <meta property="twitter:title" content="Agenda de Shows Metal Ceará 🤘">
    <meta property="twitter:description"
        content="O guia definitivo de bares, shows e eventos de Heavy Metal no Ceará com mapa interativo.">
    <meta property="twitter:image"
        content="http://andff.runasp.net/Agenda-de-Shows-Metal-Ceara/img/logo_metal_ceara.png">


    <link rel="stylesheet" href="css/leaflet.css" />
    <link rel="stylesheet" href="css/style.css?v=1.1" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="img/logo_metal_ceara.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/logo_metal_ceara.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/logo_metal_ceara.png">


</head>

<body>

    <button id="menuBtn">☰</button>

    <div id="sidebar">

        <div style="display:flex; align-items:center; gap:10px;">
            <div><img src="img/logo_metal_ceara.png" width="70" /></div>
            <div>
                <h3>Agenda de Shows<br>Metal Ceará</h3>
            </div>
        </div>

        <hr>

        <!--<h5>Categorias</h5>-->
        <div class="categorias-container">
            <label class="categoria-btn">
                <input type="checkbox" value="bar" checked>
                <span>Bar</span>
            </label>
            <label class="categoria-btn">
                <input type="checkbox" value="show" checked>
                <span>Show</span>
            </label>
            <label class="categoria-btn">
                <input type="checkbox" value="evento" checked>
                <span>Evento</span>
            </label>
        </div>

        <!--<h3>Buscar</h3>-->
        <input id="busca" placeholder="Buscar">

        <!--<h3>Cidade</h3>-->
        <select id="cidadeFiltro">
            <option value="todas">Cidades</option>
        </select>



        <!--<h5>Filtre pelo período</h5>-->
        <div style="display: flex; gap: 10px;">
            <input type="date" id="dataInicio">
            <input type="date" id="dataFim">
        </div>



        <hr>
        <h5>Próximas atrações</h5>
        <div id="lista"></div>

    </div>

    <div id="map"></div>

    <script src="js/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <script>

        // menu mobile
        menuBtn.onclick = () => {
            sidebar.classList.toggle("ativo");
            menuBtn.innerHTML = sidebar.classList.contains("ativo") ? "✖" : "☰";
        };

        // mapa
        var map = L.map('map', {
            zoomControl: false
        }).setView([-3.76, -38.53], 13);

        L.Icon.Default.imagePath = 'img/';

        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        // tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // fechar menu ao clicar no mapa no mobile
        map.on('click', () => {
            if (window.innerWidth < 768 && sidebar.classList.contains("ativo")) {
                sidebar.classList.remove("ativo");
                menuBtn.innerHTML = "☰";
            }
        });

        // cluster
        var cluster = L.markerClusterGroup();
        map.addLayer(cluster);

        // ícones
        var icones = {
            bar: L.icon({ iconUrl: "img/vermelho.png", iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] }),
            show: L.icon({ iconUrl: "img/amarelo.png", iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] }),
            evento: L.icon({ iconUrl: "img/azul.png", iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] })
        };

        var locais = [];


        // carregar JSON
        fetch("database.json")
            .then(r => r.json())
            .then(data => {
                locais = data;
                popularCidades();
                render();
            });


        // cidades
        function popularCidades() {
            let cidades = [...new Set(locais.map(l => l.cidade))];
            cidades.forEach(c => {
                let o = document.createElement("option");
                o.value = c;
                o.textContent = c;
                cidadeFiltro.appendChild(o);
            });
        }


        // calcular dias
        function diasRestantes(data) {
            let hoje = new Date();
            let evento = new Date(data);
            hoje.setHours(0, 0, 0, 0);
            evento.setHours(0, 0, 0, 0);
            return Math.ceil((evento - hoje) / 86400000);
        }


        // badge
        function badgeData(data) {
            if (!data) return "";

            let dias = diasRestantes(data);

            if (dias === 0) return `<span style="color:#0f0;font-weight:bold">HOJE</span>`;
            if (dias > 0 && dias <= 7) return `<span style="color:orange;font-weight:bold">EM ${dias} DIAS</span>`;
            if (dias < 0) return `<span style="color:#777">ENCERRADO</span>`;

            return "";
        }


        // filtros
        function filtros() {

            let nome = busca.value.toLowerCase();
            let cidade = cidadeFiltro.value;
            let tipos = [...document.querySelectorAll("input[type=checkbox]:checked")].map(c => c.value);
            let di = dataInicio.value;
            let df = dataFim.value;

            return locais.filter(l => {

                if (nome && !l.nome.toLowerCase().includes(nome)) return false;
                if (cidade != "todas" && l.cidade != cidade) return false;
                if (!tipos.includes(l.tipo)) return false;

                if ((di || df) && l.data) {
                    if (di && l.data < di) return false;
                    if (df && l.data > df) return false;
                }

                if ((di || df) && !l.data) return false;

                return true;

            });
        }


        // render
        function render() {

            cluster.clearLayers();
            lista.innerHTML = "";

            let filtrados = filtros();

            // ordenar
            filtrados.sort((a, b) => {
                if (!a.data && !b.data) return 0;
                if (!a.data) return 1;
                if (!b.data) return -1;
                return new Date(a.data) - new Date(b.data);
            });


            filtrados.forEach(p => {

                let dias = p.data ? diasRestantes(p.data) : null;

                let classe = "";
                if (dias === 0) classe = "hoje";
                else if (dias > 0 && dias <= 7) classe = "proximo";
                else if (dias < 0) classe = "passado";

                let popup = `
<div style="width:200px">
<img src="${p.foto || ""}" style="width:100%;border-radius:8px;margin-bottom:6px">
<b>${p.nome}</b><br>
${p.descricao}<br><br>
📍 ${p.cidade}<br>
${p.data ? `📅 ${p.data} ${p.horario ? ` às ${p.horario}` : ""} ${badgeData(p.data)}<br>` : ""}
📞 ${p.telefone}<br>
<a target="_blank" href="${p.instagram}">Instagram</a><br>
${p.linkingresso ? `<a target="_blank" href="${p.linkingresso}" style="display:inline-block;background:orange;color:#fff;padding:5px 10px;border-radius:5px;text-decoration:none;margin-top:5px;font-weight:bold;width:100\%;text-align:center;box-sizing:border-box">🎫 Comprar Ingresso</a><br>` : ""}
<br>
<a target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}">
📍 Rota no Google Maps
</a>
</div>
`;

                let m = L.marker([p.lat, p.lng], { icon: icones[p.tipo] }).bindPopup(popup);
                cluster.addLayer(m);

                // lista lateral
                let div = document.createElement("div");
                div.className = "item " + classe;
                div.innerHTML = `<b>${p.nome}</b><br>${p.cidade}<br>${p.data ? badgeData(p.data) : ""}`;

                div.onclick = () => {
                    map.setView([p.lat, p.lng], 16);
                    m.openPopup();
                    if (window.innerWidth < 768) {
                        sidebar.classList.remove("ativo");
                        menuBtn.innerHTML = "☰";
                    }
                };

                lista.appendChild(div);

            });

        }


        // eventos
        busca.oninput = render;
        cidadeFiltro.onchange = render;
        document.querySelectorAll("input[type=checkbox]").forEach(c => c.onchange = render);
        dataInicio.onchange = render;
        dataFim.onchange = render;

    </script>

</body>

</html>
