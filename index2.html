<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Mapa Completo</title>

    <link rel="stylesheet" href="leaflet.css" />

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* botão custom */
        .loc-btn {
            background: #111;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .loc-btn:hover {
            background: #333;
        }

        /* zoom custom */
        .leaflet-control-zoom a {
            background: #111 !important;
            color: white !important;
            border: none !important;
        }

        .leaflet-control-zoom a:hover {
            background: #444 !important;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="leaflet.js"></script>

    <script>

        // mapa dark
        var map = L.map('map', {
            zoomControl: false
        }).setView([-14.2350, -51.9253], 4);

        // tiles dark
        L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            {
                attribution: '© OpenStreetMap © Carto'
            }).addTo(map);

        // zoom custom posição
        L.control.zoom({ position: "topright" }).addTo(map);


        // ícone personalizado
        var icone = L.icon({
            iconUrl: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -35]
        });

        // marcador
        L.marker([-3.7319, -38.5267], { icon: icone })
            .addTo(map)
            .bindPopup("Fortaleza")
            .openPopup();


        // botão localização
        var control = L.control({ position: "topleft" });

        control.onAdd = function () {
            var btn = L.DomUtil.create("button", "loc-btn");
            btn.innerHTML = "📍 Minha localização";

            btn.onclick = function () {
                map.locate({ setView: true, maxZoom: 15 });
            };
            return btn;
        };

        control.addTo(map);


        // quando localização encontrada
        map.on("locationfound", function (e) {
            L.marker(e.latlng)
                .addTo(map)
                .bindPopup("Você está aqui")
                .openPopup();
        });

        // erro localização
        map.on("locationerror", function () {
            alert("Não foi possível obter sua localização");
        });

    </script>

</body>

</html>
